<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

    <nav class="top-navbar">
        <a href="Index.html">Home</a>

        <a href="education.html">Education</a>
        <a href="project.html">Projects</a>

    <div class="page-container">

        <h1>Contact</h1>

        <ul class="contact-list">
            <li>Email: <a href="mailto:jwalakumari510@gmail.com">jwalakumari510@gmail.com</a></li>
            <li>LinkedIn: <a href="https://www.linkedin.com/in/jwala-kumari-84b5113b5" target="_blank">View Profile</a></li>
        </ul>

        <div class="contact-form-section">
            <h2>Send Me a Message</h2>
            <form action="https://formsubmit.co/jwalakumari510@gmail.com" method="POST" class="contact-form">
                <!-- Disable CAPTCHA -->
                <input type="hidden" name="_captcha" value="false">
                <!-- Custom subject -->
                <input type="hidden" name="_subject" value="New message from Portfolio Contact Form">

                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        <a href="Index.html" class="back-link">&#8592; Back to Home</a>

    </div>
